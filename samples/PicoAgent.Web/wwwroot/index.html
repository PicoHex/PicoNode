<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicoAgent</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
        #init { text-align: center; }
        #init .logo { font-size: 2.2em; font-weight: bold; color: var(--accent); margin-bottom: 8px; }
        #init p  { color: var(--fg-muted); font-size: 0.95em; }
        #init .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin-top: 20px; }
        #init .error { color: #e05555; margin-top: 16px; font-size: 0.85em; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="init">
        <div class="logo">PicoAgent</div>
        <p id="msg">Starting...</p>
        <div class="spinner"></div>
        <div id="err" class="error"></div>
    </div>
    <script>
        (async function() {
            const msg = document.getElementById('msg');
            const err = document.getElementById('err');
            try {
                const r = await fetch('/api/config/status');
                const s = await r.json();
                if (s.configured) {
                    msg.textContent = 'Launching agent...';
                    window.location.replace('/agent.html');
                } else {
                    msg.textContent = 'No provider configured.';
                    err.textContent = 'Redirecting to setup...';
                    setTimeout(() => window.location.replace('/config.html'), 800);
                }
            } catch {
                msg.textContent = 'Cannot reach server.';
                err.textContent = 'Is PicoAgent running on port 9000?';
            }
        })();
    </script>
</body>
</html>

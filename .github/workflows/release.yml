# PicoNode Release — NuGet publish
# Triggered by tags shaped like v*

name: release

on:
  push:
    tags: [v*]

permissions:
  contents: write
  id-token: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set version from tag
        run: echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Restore
        run: dotnet restore PicoNode.slnx

      - name: Build
        run: dotnet build PicoNode.slnx --no-restore -c Release

      - name: Pack
        run: >
          dotnet pack PicoNode.slnx --no-restore --no-build -c Release
          -p:Version=${{ env.PACKAGE_VERSION }}
          -o packages

      - name: Publish to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: >
          dotnet nuget push packages/*.nupkg
          --api-key ${{ env.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*
          generate_release_notes: true

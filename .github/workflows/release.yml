# PicoNode Release — NuGet publish
# Triggered by tags shaped like v*

name: release

on:
  push:
    tags: [v*]

permissions:
  contents: write
  id-token: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set version from tag
        run: echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      # ── Pack in dependency order ────────────────────────────
      # Build + pack each project individually with
      # UseProjectReferences=false so the nupkg records NuGet
      # dependencies instead of project references.

      - name: Pack PicoNode.Abs
        run: >
          dotnet pack src/PicoNode.Abs/PicoNode.Abs.csproj
          -c Release -p:Version=${{ env.PACKAGE_VERSION }}
          -p:UseProjectReferences=false
          -o packages

      - name: Pack PicoNode
        run: >
          dotnet pack src/PicoNode/PicoNode.csproj
          -c Release -p:Version=${{ env.PACKAGE_VERSION }}
          -p:UseProjectReferences=false
          -p:RestoreAdditionalProjectSources=./packages
          -o packages

      - name: Pack PicoNode.Http
        run: >
          dotnet pack src/PicoNode.Http/PicoNode.Http.csproj
          -c Release -p:Version=${{ env.PACKAGE_VERSION }}
          -p:UseProjectReferences=false
          -p:RestoreAdditionalProjectSources=./packages
          -o packages

      - name: Pack PicoNode.Web
        run: >
          dotnet pack src/PicoNode.Web/PicoNode.Web.csproj
          -c Release -p:Version=${{ env.PACKAGE_VERSION }}
          -p:UseProjectReferences=false
          -p:RestoreAdditionalProjectSources=./packages
          -o packages

      - name: Pack PicoWeb
        run: >
          dotnet pack src/PicoWeb/PicoWeb.csproj
          -c Release -p:Version=${{ env.PACKAGE_VERSION }}
          -p:UseProjectReferences=false
          -p:RestoreAdditionalProjectSources=./packages
          -o packages

      - name: Publish to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: >
          dotnet nuget push packages/*.nupkg
          --api-key ${{ env.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*
          generate_release_notes: true
